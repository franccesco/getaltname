# Dependabot version updates.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# This project is managed with uv (pyproject.toml + uv.lock is the source of
# truth). The "uv" ecosystem updates the lockfile; there is no requirements.txt.

version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
