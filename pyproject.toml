[tool.poetry]
name = "gsan"
version = "4.2.3"
description = "Extract subdomains from HTTPS sites"
authors = ["Franccesco Orozco <franccesco@codingdose.info>"]
license = "MIT"

[tool.poetry.scripts]
gsan = "gsan.cli:cli"

[tool.black]
line-length = 120

[tool.poetry.dependencies]
python = ">=3.9,<3.13"
click = "^8.1.7"
colorama = "^0.4.6"
pandas = "^2.1.2"
tldextract = "^5.0.1"
pyopenssl = "^23.3.0"
pyasn1 = "^0.5.0"
ndg-httpsclient = "^0.5.1"


[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
